[cuda]
packages = ["flex_gemm_ap", "cumesh_vb", "o_voxel_vb_ap", "flash-attn", "sageattention", "drtk"]

[dependencies]
av = "*"

[target.linux-64.dependencies]
c-compiler = "*"

[pypi-dependencies]
# HuggingFace models
huggingface_hub = "*"
hf_transfer = "*"
hf_xet = "*"
transformers = ">=4.56.0"
safetensors = "*"
timm = "*"
comfy-aimdo = "*"
comfy-sparse-attn = "*"
trimesh = { version = "*", extras = ["easy"] }
plyfile = "*"
zstandard = "*"
psutil = "*"

# Image processing
pillow = ">=9.0.0"
opencv-python-headless = "*"
imageio = ">=2.0.0"

# General
numpy = ">=1.21.0"
easydict = "*"
tqdm = "*"

[env_vars]
PYTORCH_CUDA_ALLOC_CONF = "expandable_segments:True"

[target.linux-64.pypi-dependencies]
triton = ">=3.0.0"

[target.win-64.pypi-dependencies]
triton-windows = ">=3.5.0"